services:
  mysql:
    image: mysql:8.4
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:?set by scripts/prepare_prod_env.py}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-goku_router}
      MYSQL_USER: ${MYSQL_USER:-goku_router}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:?set by scripts/prepare_prod_env.py}
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uroot -p$${MYSQL_ROOT_PASSWORD} --silent"]
      interval: 10s
      timeout: 5s
      retries: 12

  backend:
    build:
      context: ./backend
    restart: unless-stopped
    env_file:
      - backend/.env
    environment:
      DATABASE_URL: mysql+pymysql://${MYSQL_USER:-goku_router}:${MYSQL_PASSWORD}@mysql:3306/${MYSQL_DATABASE:-goku_router}
    depends_on:
      mysql:
        condition: service_healthy
    ports:
      - "${ROUTER_BIND_HOST:-127.0.0.1}:${ROUTER_API_PORT:-8159}:8000"
    networks:
      default:
      goku_edge:
        aliases:
          - goku-router-backend
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=5).read()\""]
      interval: 20s
      timeout: 10s
      retries: 6

  frontend:
    build:
      context: ./frontend
      args:
        VITE_BACKEND_URL: ${VITE_BACKEND_URL:-/router-api}
        VITE_FRONTEND_BASE: ${VITE_FRONTEND_BASE:-/router/}
        VITE_FRONTEND_BASENAME: ${VITE_FRONTEND_BASENAME:-/router}
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_started
    ports:
      - "${ROUTER_BIND_HOST:-127.0.0.1}:${ROUTER_ADMIN_PORT:-5159}:80"
    networks:
      default:
      goku_edge:
        aliases:
          - goku-router-frontend

volumes:
  mysql_data:

networks:
  goku_edge:
    name: goku_edge
