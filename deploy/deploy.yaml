---
kind: "Deployment"
apiVersion: "apps/v1"
metadata: 
  name: "goku-router"
  namespace: "aios"
  labels: 
    app: "goku-router"
spec: 
  replicas: 0
  selector: 
    matchLabels: 
      app: "goku-router"
  template: 
    metadata: 
      labels: 
        app: "goku-router"
    spec: 
      containers: 
        - 
          name: "goku-router"
          image: "gcr.io/sre-common-test-379805/aios/goku-router:cicd"

