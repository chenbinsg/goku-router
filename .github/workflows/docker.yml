name: Docker

on:
  push:
    branches: [main, dev-yang, cicd]
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build & Push
    runs-on: [self-hosted, Linux, X64, goku-router-ci]

    steps:
      - name: Free disk space
        run: |
          docker image prune -af 2>/dev/null || true
          docker builder prune -af 2>/dev/null || true
          df -h

      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Log in to GCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: gcr.io
          username: _json_key
          password: ${{ secrets.GCR_JSON_KEY }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: |
            ${{ secrets.DOCKERHUB_USERNAME }}/goku-router
            gcr.io/sre-common-test-379805/aios/goku-router
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=ref,event=branch
            type=sha,prefix=sha-,format=short

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Update deployment image
        if: github.event_name != 'pull_request' && github.ref_type == 'branch'
        env:
          IMAGE_REPOSITORY: gcr.io/sre-common-test-379805/aios/goku-router
          IMAGE_TAG: ${{ github.ref_name }}
        run: |
          if [ ! -f deploy/deploy.yaml ]; then
            echo "deploy/deploy.yaml not found; skipping deployment image update."
            exit 0
          fi

          IMAGE="${IMAGE_REPOSITORY}:${IMAGE_TAG}"
          sed -i -E "s|^([[:space:]]*image:[[:space:]]*)\"?[^\"]*/goku-router:[^\"[:space:]]*\"?[[:space:]]*$|\1\"${IMAGE}\"|" deploy/deploy.yaml
          git diff -- deploy/deploy.yaml

      - name: Commit deployment image update
        if: github.event_name != 'pull_request' && github.ref_type == 'branch'
        run: |
          if git diff --quiet -- deploy/deploy.yaml; then
            echo "No deployment image changes to commit."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add deploy/deploy.yaml
          git commit -m "Update deployment image [skip ci]"
          git push
