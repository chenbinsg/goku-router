name: Backend

on:
  push:
    branches: [main]
    paths:
      - 'backend/**'
      - '.github/workflows/backend.yml'
  pull_request:
    branches: [main]
    paths:
      - 'backend/**'

jobs:
  test:
    name: Lint & Test
    runs-on: [self-hosted, Linux, X64, goku-router-ci]
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python venv
        run: |
          VENV="$HOME/.cache/goku-router-ci/venv"
          if [ ! -x "$VENV/bin/python" ]; then
            python3 -m venv "$VENV"
          fi
          echo "$VENV/bin" >> "$GITHUB_PATH"

      - name: Install dependencies
        run: pip install -r requirements.txt ruff pytest

      - name: Lint (ruff)
        run: ruff check app/ --select E,F,W --ignore E501

      - name: Test
        run: pytest tests/ -v
